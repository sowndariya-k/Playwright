name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ✅ Change 1: Pin Node version from 'lts/*' to '20'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'        

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # ✅ Change 2: Add ENV and CI variables for dotenv and headless
    - name: Run Playwright tests
      run: npx playwright test
      env:
        CI: true
        ENV: qa                   

    # ✅ Change 3: Upload test-results folder as well
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 30